<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hellhunter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <span class="wordmark">Hellhunter</span>
    <p class="byline">by Max Kostyuchenko</p>
  </header>

  <main>
    <div id="covers" class="covers" aria-label="Book covers"></div>

    <section id="detail" class="detail hidden" aria-live="polite">
      <div class="detail-inner">
        <div id="detail-cover" class="detail-cover"></div>
        <div class="detail-meta">
          <p id="detail-status" class="status-badge"></p>
          <h2 id="detail-title"></h2>
          <p id="detail-desc"></p>
          <div id="detail-links" class="buy-links"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">© Max Kostyuchenko</footer>

  <script src="script.js"></script>
</body>
</html>
