<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Books — hellhunter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>About my books</h1>
    <p class="lead">A series of books — covers below. Click a cover to see details and buy links.</p>
  </header>

  <main>
    <div id="covers" class="covers" aria-label="Book covers"></div>

    <section id="detail" class="detail hidden" aria-live="polite">
      <div class="detail-inner">
        <div id="detail-cover" class="detail-cover" aria-hidden="true"></div>
        <div class="detail-meta">
          <h2 id="detail-title"></h2>
          <p id="detail-desc"></p>
          <p id="detail-links" class="buy-links"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">© Author</footer>

  <script src="script.js"></script>
</body>
</html>
